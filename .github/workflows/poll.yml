name: Poll Algothon leaderboard

# GitHub's shared cron scheduler delays and drops ticks unpredictably, so
# instead of one poll per tick we start hourly and poll 4 times inside the
# job (at ~0/15/30/45 min). One successful start per hour = full coverage.
on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll every 15 minutes for the hour
        run: |
          git config user.name "algothon-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          for i in 1 2 3 4; do
            echo "=== poll $i of 4 at $(date -u +%H:%M:%SZ) ==="
            python poll_once.py
            git add data/
            if ! git diff --cached --quiet; then
              git commit -m "Poll leaderboard $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              git pull --rebase origin main
              git push
            else
              echo "No changes to commit"
            fi
            if [ "$i" -lt 4 ]; then sleep 900; fi
          done
