name: Poll Algothon leaderboard

on:
  schedule:
    # Off the :00/:15/:30/:45 marks - those slots are the most contended on
    # GitHub's shared cron scheduler and get delayed/dropped the most.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python poll_once.py

      - name: Commit and push if data changed
        run: |
          git config user.name "algothon-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "Poll leaderboard $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No changes to commit"
          fi
